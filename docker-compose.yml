# Pull the CI-built image and run it on your server.
#   PORT=9000 docker compose up -d        # or set PORT in a .env file
#   docker compose up -d                   # defaults to 8080
# Then open http://<your-server>:${PORT}
services:
  llm-eval-suite:
    image: ghcr.io/thecodacus/llm-eval-suite:latest
    container_name: llm-eval-suite
    environment:
      - PORT=${PORT:-8080}     # the app listens on this port
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    volumes:
      - eval-data:/data        # SQLite db persists here
    restart: unless-stopped
    # lets the app reach model servers (LM Studio/Ollama) running on the host:
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  eval-data:
